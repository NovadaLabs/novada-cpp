name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            cc: gcc
            cxx: g++
          - name: linux-clang
            os: ubuntu-latest
            cc: clang
            cxx: clang++
          - name: macos-clang
            os: macos-latest
            cc: clang
            cxx: clang++
          - name: windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev nlohmann-json3-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja nlohmann-json

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Set compiler
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}" >> "$GITHUB_ENV"
          echo "CXX=${{ matrix.cxx }}" >> "$GITHUB_ENV"

      - name: Enable MSVC developer shell
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DNOVADA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  sanitizers:
    name: linux-asan-ubsan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcurl4-openssl-dev nlohmann-json3-dev

      - name: Configure (ASan/UBSan)
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DNOVADA_BUILD_TESTS=ON -DNOVADA_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --output-on-failure

  lint:
    name: clang-format & clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy ninja-build \
            libcurl4-openssl-dev nlohmann-json3-dev

      - name: clang-format
        run: |
          find include src tests examples \( -name '*.hpp' -o -name '*.cpp' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Configure (for compile_commands.json)
        run: cmake -S . -B build -G Ninja -DNOVADA_BUILD_TESTS=ON

      - name: clang-tidy
        run: |
          find src -name '*.cpp' -print0 | xargs -0 clang-tidy -p build
